# 应用名称
server:
  port: 8084  # 网关 8080，mom-wms 独立端口

spring:
  application:
    name: mom-wms
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:wms.yaml
  # 本地数据源（Nacos wms.yaml 为空时回退）Flyway 使用此连接执行迁移
  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_wms?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  # Flyway 数据库迁移（ly_factmesh_wms 独立库，脚本位于 classpath:db/migration）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ly.factmesh.wms.infrastructure.database.entity
  configuration:
    map-underscore-to-camel-case: true

