# 应用基础配置（网关路由由 Nacos 配置中心提供）
spring:
  application:
    name: mom-gateway
  profiles:
    active: dev
  config:
    import: optional:nacos:gateway.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          httpclient:
            connect-timeout: 3000
            response-timeout: 30s
          routes:
            - id: api-docs-all
              uri: forward:///local-api-docs
              predicates:
                - Path=/v3/api-docs/all
            - id: api-admin
              uri: lb://mom-admin
              predicates:
                - Path=/api/auth/**,/api/users/**,/api/roles/**,/api/permissions/**,/api/dicts/**,/api/configs/**
            - id: api-iot
              uri: lb://mom-iot
              predicates:
                - Path=/api/devices/**
            - id: api-mes
              uri: lb://mom-mes
              predicates:
                - Path=/api/work-orders/**,/api/processes/**,/api/lines/**,/api/work-reports/**
            - id: api-wms
              uri: lb://mom-wms
              predicates:
                - Path=/api/materials/**,/api/requisitions/**,/api/inventory/**
            - id: api-qms
              uri: lb://mom-qms
              predicates:
                - Path=/api/inspection-tasks/**,/api/inspection-results/**,/api/ncr/**

server:
  port: 8080
  max-http-header-size: 32KB

# management、app.jwt、app.rate-limit 由 Nacos 配置中心提供（见 sql/nacos-all-init.sql）
