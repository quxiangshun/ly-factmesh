# 应用基础配置（网关路由由 Nacos 配置中心提供）
spring:
  application:
    name: mom-gateway
  autoconfigure:
    exclude:
      - org.apache.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataSpringFenceAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
  profiles:
    active: dev
  config:
    import: optional:nacos:gateway.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: GET,POST,PUT,DELETE,PATCH,OPTIONS
            allowedHeaders: "*"
            exposedHeaders: Authorization
            allowCredentials: true
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          httpclient:
            connect-timeout: 3000
            response-timeout: 30s
          routes:
            - id: api-docs-all
              uri: forward:///local-api-docs
              predicates:
                - Path=/v3/api-docs/all
            - id: api-sql
              uri: lb://mom-admin
              predicates:
                - Path=/api/sql/**
            - id: api-redis
              uri: lb://mom-admin
              predicates:
                - Path=/api/redis/**
            - id: api-influxdb
              uri: lb://mom-admin
              predicates:
                - Path=/api/influxdb/**
            - id: api-admin
              uri: lb://mom-admin
              predicates:
                - Path=/api/auth/**,/api/users/**,/api/roles/**,/api/permissions/**,/api/dicts/**,/api/configs/**,/api/tenants/**,/api/operation-logs/**,/api/audit-logs/**
            - id: api-iot
              uri: lb://mom-iot
              predicates:
                - Path=/api/devices/**
            - id: api-mes
              uri: lb://mom-mes
              predicates:
                - Path=/api/work-orders/**,/api/processes/**,/api/lines/**,/api/work-reports/**
            - id: api-wms
              uri: lb://mom-wms
              predicates:
                - Path=/api/materials/**,/api/requisitions/**,/api/inventory/**
            - id: api-qms
              uri: lb://mom-qms
              predicates:
                - Path=/api/inspection-tasks/**,/api/inspection-results/**,/api/ncr/**,/api/quality-trace/**
            - id: api-ops
              uri: lb://mom-ops
              predicates:
                - Path=/api/global-logs/**,/api/ops-audit-logs/**,/api/system-events/**
            - id: api-simulator
              uri: lb://mom-simulator
              predicates:
                - Path=/api/simulator/**

server:
  port: 9090
  max-http-header-size: 32KB

# 本地兜底（Nacos 未连接时使用）
app:
  jwt:
    secret: ${JWT_SECRET:ly-factmesh-admin-jwt-secret-change-in-production}
    gateway-auth-enabled: false
  rate-limit:
    enabled: false
    requests-per-minute: 200

