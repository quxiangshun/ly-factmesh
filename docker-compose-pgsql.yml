services:
  postgres:
    image: postgres:16.4
    container_name: ly-factmesh-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ly_factmesh_main
    volumes:
      - ./sql/ly_factmesh_admin.sql:/docker-entrypoint-initdb.d/1_ly_factmesh_admin.sql
      - ./sql/ly_factmesh_common.sql:/docker-entrypoint-initdb.d/2_ly_factmesh_common.sql
      - ./sql/ly_factmesh_iot.sql:/docker-entrypoint-initdb.d/3_ly_factmesh_iot.sql
      - ./sql/ly_factmesh_mes.sql:/docker-entrypoint-initdb.d/4_ly_factmesh_mes.sql
      - ./sql/ly_factmesh_qms.sql:/docker-entrypoint-initdb.d/5_ly_factmesh_qms.sql
      - ./sql/ly_factmesh_wms.sql:/docker-entrypoint-initdb.d/6_ly_factmesh_wms.sql
    command: >
      postgres -c shared_buffers=2GB
               -c work_mem=64MB
               -c maintenance_work_mem=1GB
               -c wal_level=replica
               -c max_wal_size=10GB
               -c wal_buffers=16MB
               -c synchronous_commit=on
               -c max_connections=1000
               -c shared_preload_libraries=pg_stat_statements
               -c pg_stat_statements.track=all
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ly_factmesh_main"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nacos-network
    deploy:
      resources:
        limits:
          memory: 4GB
        reservations:
          memory: 2GB
  
  mysql-nacos:
    image: mysql:8.0
    container_name: ly-factmesh-mysql-nacos
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ly_factmesh_nacos
      MYSQL_USER: nacos
      MYSQL_PASSWORD: nacos
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    volumes:
      - ./sql/nacos-all-init.sql:/docker-entrypoint-initdb.d/1_nacos-all-init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --skip-host-cache
      --skip-name-resolve
      --require_secure_transport=OFF
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --init-connect='SET NAMES utf8mb4'
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nacos-network
    deploy:
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 1GB
  
  influxdb:
    image: influxdb:2.7-alpine
    container_name: ly-factmesh-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: ly-factmesh
      DOCKER_INFLUXDB_INIT_BUCKET: iot-telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ly-factmesh-iot-token
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "influx ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nacos-network
    deploy:
      resources:
        limits:
          memory: 512MB

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: ly-factmesh-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    volumes:
      - ./nacos-config/application.properties:/home/nacos/conf/application.properties
    restart: always
    depends_on:
      mysql-nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nacos-network

networks:
  nacos-network:
    driver: bridge