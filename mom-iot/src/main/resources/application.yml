# InfluxDB 时序数据库（设备遥测数据）
influxdb:
  url: http://localhost:8086
  token: ly-factmesh-iot-token
  org: ly-factmesh
  bucket: iot-telemetry

# 定时采集（将在线设备 Device 表状态同步到 InfluxDB）
iot:
  scheduled-collect:
    enabled: false  # 默认关闭，按需开启
    cron: "0 */5 * * * ?"  # 每 5 分钟执行
  # 模拟器对接（从 mom-simulator REST 拉取模拟点位并上报到 IoT）
  simulator-collect:
    enabled: true  # 开发环境开启，对接模拟器
    url: http://localhost:9089  # 模拟器地址，直连或经网关
    cron: "0/5 * * * * ?"  # 每 5 秒采集一次
  telemetry:
    cleaner:
      enabled: true  # 遥测数据清洗（过滤 NaN/Inf、范围校验）
  # 工业协议接入（OPC UA、Modbus TCP）
  industrial:
    enabled: false  # 按需开启
    opcua:
      endpoint-url: opc.tcp://192.168.1.100:4840
      username: ""
      password: ""
      connect-timeout-ms: 5000
      pool-max-total: 10
      pool-max-idle: 5
      pool-min-idle: 2
    modbus:
      host: 192.168.1.101
      port: 502
      connect-timeout-ms: 3000
      retry-count: 3
      pool-max-total: 10
      pool-max-idle: 5
      pool-min-idle: 2

# 读写分离（可选）
