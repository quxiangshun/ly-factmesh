# 应用名称
spring:
  application:
    name: mom-iot
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:iot.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos

  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_iot?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  # Flyway 数据库迁移（ly_factmesh_iot 独立库，脚本位于 classpath:db/migration）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# InfluxDB 时序数据库（设备遥测数据）
influxdb:
  url: http://localhost:8086
  token: ly-factmesh-iot-token
  org: ly-factmesh
  bucket: iot-telemetry

# 定时采集（将在线设备 Device 表状态同步到 InfluxDB）
iot:
  scheduled-collect:
    enabled: false  # 默认关闭，按需开启
    cron: "0 */5 * * * ?"  # 每 5 分钟执行
  telemetry:
    cleaner:
      enabled: true  # 遥测数据清洗（过滤 NaN/Inf、范围校验）

# 读写分离（可选）
# infra:
#   datasource:
#     read-write-split:
#       enabled: true
#       master-url: jdbc:postgresql://localhost:5432/ly_factmesh_iot
#       slave-url: jdbc:postgresql://slave-host:5432/ly_factmesh_iot
#       username: postgres
#       password: postgres

# Seata 分布式事务（可选）
# seata:
#   enabled: true
#   application-id: mom-iot
#   tx-service-group: ly_mom_tx_group

# MyBatis Plus配置
mybatis-plus:
  # XML映射文件位置
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类包路径
  type-aliases-package: com.ly.factmesh.iot.domain.entity
  # 配置日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
