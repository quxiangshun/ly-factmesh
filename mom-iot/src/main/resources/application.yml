# Seata 分布式事务（可选）
# seata:
#   enabled: true
#   application-id: mom-iot
#   tx-service-group: ly_mom_tx_group

# MyBatis Plus配置
mybatis-plus:
  # XML映射文件位置
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类包路径
  type-aliases-package: com.ly.factmesh.iot.domain.entity
  # 配置日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
