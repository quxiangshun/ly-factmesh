# 应用名称
server:
  port: 9092

spring:
  application:
    name: mom-iot
  autoconfigure:
    # Seata 2.2.0 与 Spring Boot 4 不兼容，且 mom-iot 未启用分布式事务，排除全部 Seata 自动配置
    exclude:
      - org.apache.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataSpringFenceAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:iot.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos

  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_iot?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
    validate-on-migrate: true

# MQTT（可选，对接 EMQX 用于设备遥测、领域事件）
