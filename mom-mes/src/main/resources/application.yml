# 应用名称
server:
  port: 8083  # 网关 8080，mom-mes 独立端口

spring:
  application:
    name: mom-mes
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:mes.yaml
  # 本地数据源（Nacos mes.yaml 为空时回退）
  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_mes?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
    validate-on-migrate: true

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ly.factmesh.mes.infrastructure.database.entity
  configuration:
    map-underscore-to-camel-case: true

