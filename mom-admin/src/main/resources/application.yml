# 应用名称
spring:
  application:
    name: mom-admin
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:admin.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_admin?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

# 读写分离（可选）
# infra:
#   datasource:
#     read-write-split:
#       enabled: true
#       master-url: jdbc:postgresql://localhost:5432/ly_factmesh_admin
#       slave-url: jdbc:postgresql://slave-host:5432/ly_factmesh_admin
#       username: postgres
#       password: postgres

# Seata 分布式事务（可选）
# seata:
#   enabled: true
#   application-id: mom-admin
#   tx-service-group: ly_mom_tx_group

app:
  jwt:
    secret: ${JWT_SECRET:ly-factmesh-admin-jwt-secret-change-in-production}
  access-token-expire-seconds: 7200
  refresh-token-expire-seconds: 604800
