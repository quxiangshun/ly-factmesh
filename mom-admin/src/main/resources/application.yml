# 应用名称
server:
  port: 9091

spring:
  application:
    name: mom-admin
  autoconfigure:
    # Seata 2.2.0 与 Spring Boot 4 不兼容，且 mom-admin 未启用分布式事务，排除全部 Seata 自动配置
    exclude:
      - org.apache.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataSpringFenceAutoConfiguration
      - org.apache.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
  profiles:
    active: dev  # 默认使用开发环境
  config:
    import: optional:nacos:admin.yaml
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: LY_MOM_GROUP
        username: nacos
        password: nacos
  datasource:
    url: jdbc:postgresql://localhost:5432/ly_factmesh_admin?useSSL=false&serverTimezone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
    validate-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

# mom-ai gRPC 地址（admin 通过 gRPC 调用，Docker 中设为 mom-ai:9098）
ai:
  grpc:
    address: ${MOM_AI_GRPC_ADDRESS:localhost:9098}

# 读写分离（可选）
# infra:
#   datasource:
#     read-write-split:
#       enabled: true
#       master-url: jdbc:postgresql://localhost:5432/ly_factmesh_admin
#       slave-url: jdbc:postgresql://slave-host:5432/ly_factmesh_admin
#       username: postgres
#       password: postgres

# Seata 分布式事务（可选）
# seata:
#   enabled: true
#   application-id: mom-admin
#   tx-service-group: ly_mom_tx_group

app:
  jwt:
    secret: ${JWT_SECRET:ly-factmesh-admin-jwt-secret-change-in-production}
  access-token-expire-seconds: 7200
  refresh-token-expire-seconds: 604800
