# EMQX MQTT Broker - 供 FactMesh 设备遥测、领域事件、跨节点同步等使用
# 启动: docker compose -f tools/mqtt/docker-compose.yml up -d
# 配置: infra.mqtt.broker-url=tcp://localhost:1883
#       infra.mqtt.username=factmesh_user
#       infra.mqtt.password=factmesh_pwd123
version: '3.8'

services:
  emqx:
    image: emqx/emqx:5.4.0
    container_name: ly-factmesh-emqx
    ports:
      - "1883:1883"    # MQTT TCP
      - "8883:8883"    # MQTT TLS
      - "8083:8083"    # WebSocket
      - "18083:18083"  # Dashboard (admin/public)
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 0.0.0.0
      # 开发环境允许匿名；生产环境改为 false，并通过 Dashboard 添加用户
      EMQX_ALLOW_ANONYMOUS: "true"
      # 可选：启用内置认证后，通过 Dashboard(18083) 添加 factmesh_user/factmesh_pwd123
      # EMQX_ALLOW_ANONYMOUS: "false"
      # EMQX_AUTHENTICATION__1__MECHANISM: password_based
      # EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_LOG__LEVEL: info
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mqtt-network
    restart: unless-stopped

networks:
  mqtt-network:
    driver: bridge

volumes:
  emqx_data:
    driver: local
  emqx_log:
    driver: local
