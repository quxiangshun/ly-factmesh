# Nacos 服务注册与配置中心 + MySQL 存储
# 使用方式：docker compose -f tools/docker-compose-nacos.yml up -d

services:
  mysql-nacos:
    image: mysql:8.0
    container_name: ly-factmesh-mysql-nacos
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ly_factmesh_nacos
      MYSQL_USER: nacos
      MYSQL_PASSWORD: nacos
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    volumes:
      - ./sql/nacos-all-init.sql:/docker-entrypoint-initdb.d/1_nacos-all-init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --skip-host-cache
      --skip-name-resolve
      --require_secure_transport=OFF
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --init-connect='SET NAMES utf8mb4'
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nacos-network
    deploy:
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 1GB

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: ly-factmesh-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    volumes:
      - ../nacos-config/application.properties:/home/nacos/conf/application.properties
    restart: always
    depends_on:
      mysql-nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nacos-network

networks:
  nacos-network:
    driver: bridge
