# InfluxDB 时序库（供 mom-iot 遥测数据存储）
# 使用方式：docker compose -f tools/docker-compose-influxdb.yml up -d

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: ly-factmesh-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: ly-factmesh
      DOCKER_INFLUXDB_INIT_BUCKET: iot-telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ly-factmesh-iot-token
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "influx ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - infra-network
    deploy:
      resources:
        limits:
          memory: 512MB

networks:
  infra-network:
    driver: bridge
